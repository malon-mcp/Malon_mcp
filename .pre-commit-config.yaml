repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.3.2
    hooks:
      - id: prettier
        types_or: [ts, tsx, js, json, md, yaml, yml]
  - repo: local
    hooks:
      - id: malon-fast-tests
        name: malon fast security tests
        entry: node --test test/security/path-escape.test.ts test/security/sql-injection.test.ts
        language: system
        pass_filenames: false
        always_run: true
