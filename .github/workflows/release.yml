name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npx tsc -p tsconfig.json --noEmit
      - run: npm run build
      - run: npm publish --provenance
      - name: Smoke test install
        run: |
          npm pack --dry-run 2>&1 | head -5
          node -e "import{readFileSync}from'node:fs';const p=JSON.parse(readFileSync('./package.json','utf8'));console.log('version:',p.version);"
