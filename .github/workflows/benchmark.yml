name: Benchmark

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  unit-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Rebuild native bindings
        run: npm rebuild better-sqlite3
        env:
          npm_config_ignore_scripts: 'false'
      - run: npm run build
      - name: Unit benchmarks
        run: npm run bench
      - name: Upload unit benchmark history
        uses: actions/upload-artifact@v4
        with:
          name: unit-benchmark-results
          path: benchmarks/history/

  qa-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Rebuild native bindings
        run: npm rebuild better-sqlite3
        env:
          npm_config_ignore_scripts: 'false'
      - run: npm run build
      - name: Run comprehensive QA tests
        run: bash test-env/run-malon-tests.sh
      - name: Upload QA test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-test-report
          path: test-env/summary.json
