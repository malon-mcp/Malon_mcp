# Malon — example configuration
# Copy this to .malon/config.yml after running `malon init`
#
# MODES:
#   Cloud mode (default): uses remote LLM API providers (Gemini, Anthropic, OpenAI)
#   Local-only mode:      `malon init --local` — uses Ollama, no data leaves your machine
#
# For local-only mode, run: `malon init --local`
# For local-only with a specific model: `malon init --local --model llama3.1-8b`
# To verify Ollama is running: `malon local-check`

pricing:
  last_verified: 2026-07-16
  providers:
    anthropic:
      claude-haiku-4-5:
        input_per_million: 1.00
        output_per_million: 5.00
    openai:
      gpt-4o-mini:
        input_per_million: 0.15
        output_per_million: 0.60
    ollama:
      llama3.1-8b:
        input_per_million: 0
        output_per_million: 0
    gemini:
      gemini-2.0-flash:
        input_per_million: 0.10
        output_per_million: 0.40

search:
  provider: gemini
  model: gemini-2.0-flash
  subagent_timeout_ms: 8000
  max_rounds: 4
  max_output_bytes: 32768

index:
  ignore_patterns:
    - node_modules
    - dist
    - .git
    - .malon
  max_memory_mb: 512

cost:
  ceiling_usd: 0
  shadow:
    tokens_per_file_read: 4000
    avg_tokens_per_file: 350

rate_limits:
  max_calls_per_session: 100
  max_tokens_per_session: 500000
  window_ms: 60000

retention:
  usage_log_max_age_days: 30
  usage_log_max_size_mb: 100
  auto_prune_on_start: true

log:
  level: info
  file: ''

telemetry:
  enabled: false
